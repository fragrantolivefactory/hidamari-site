<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select a Story</title>
    <meta
      name="description"
      content="進めたい物語を選ぶためのセレクトページ。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Serif+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./immersive.css?v=3" />
  </head>
  <body class="selector-page">
    <main class="selector-shell">
      <header class="selector-header">
        <p class="selector-kicker">Choose a door</p>
        <h1>今夜、どの気配に触れる？</h1>
        <p class="selector-lead">
          ひとつ選ぶたび、温度の違う夜がひらく。甘い逆光、濡れた視線、帰れないティールーム。
        </p>
      </header>

      <section class="selector-grid">
        <a class="selector-card amber" href="./amber-window/">
          <img src="../image/Amber Window.png" alt="Amber Window" />
          <div class="selector-copy">
            <span>01</span>
            <h2>Amber Window</h2>
            <p>部屋番号 417 からはじまる、再会の熱。</p>
          </div>
        </a>

        <a class="selector-card rose" href="./rose-after-rain/">
          <img src="../image/Rose After Rain.png" alt="Rose After Rain" />
          <div class="selector-copy">
            <span>02</span>
            <h2>Rose After Rain</h2>
            <p>雨上がりの都市にだけ現れる、名前のない人。</p>
          </div>
        </a>

        <a class="selector-card night" href="./nocturne-tea-room/">
          <img src="../image/Nocturne Tea Room-b.png" alt="Nocturne Tea Room" />
          <div class="selector-copy">
            <span>03</span>
            <h2>Nocturne Tea Room</h2>
            <p>午前零時を過ぎたあとだけ開く、帰れない人の店。</p>
          </div>
        </a>
      </section>
    </main>
  </body>
</html>
